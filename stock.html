<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการสต๊อกสินค้า (Stock Management)</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/stock.css">
</head>
<body data-theme="light">
  <div class="topbar">
    <div class="brand">
      <h1 style="font-size: 1.2rem; margin: 0;">📦 ระบบสต๊อกสินค้า (Stock)</h1>
    </div>
    <div class="toolbar">
      <button class="btn btn-secondary" id="theme-toggle">ธีม: สว่าง</button>
      <a href="dashboard.html" class="btn btn-primary">กลับหน้าแรก</a>
    </div>
  </div>

  <div class="container page-fade-in" style="max-width: 1200px; padding-top: 20px;">
    
    <!-- Action Bar -->
    <div class="stock-action-bar">
      <button class="btn btn-success" id="btn-receive">+ รับเข้าสินค้า (Receive)</button>
      <button class="btn btn-primary" id="btn-reserve">🔖 จองสินค้า (Reserve)</button>
      <button class="btn btn-secondary" id="btn-sync-erp">🔄 ดึงข้อมูล ERP ล่าสุด</button>
    </div>

    <!-- Overview Dashboard -->
    <div class="stock-summary-grid">
      <div class="summary-card">
        <h3>มูลค่ารวมสต๊อก (ERP)</h3>
        <div class="value" id="sum-erp-val">฿0.00</div>
      </div>
      <div class="summary-card">
        <h3>สินค้าทั้งหมด (Actual)</h3>
        <div class="value" id="sum-actual-qty">0 <span style="font-size:0.5em;font-weight:normal;">ชิ้น</span></div>
      </div>
      <div class="summary-card alert-diff">
        <h3>Diff จาก ERP</h3>
        <div class="value" id="sum-diff">0</div>
      </div>
      <div class="summary-card">
        <h3>Dead Stock / Depp</h3>
        <div class="value" id="sum-dead-stock" style="color:var(--danger);">0</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs" style="margin-top: 24px;">
      <button class="tab-btn active" data-tab="tab-overview">ภาพรวมทั้งหมด</button>
      <button class="tab-btn" data-tab="tab-led">แผนก LED</button>
      <button class="tab-btn" data-tab="tab-marketing">แผนก Marketing</button>
    </div>

    <!-- Table Content -->
    <div class="card" style="margin-top: 0; border-top-left-radius: 0;">
      
      <!-- Filter -->
      <div style="display:flex; justify-content:space-between; margin-bottom: 16px; align-items:center;">
        <input type="text" id="search-stock" placeholder="🔍 ค้นหารหัสสินค้า / ชื่อสินค้า..." style="padding:8px 12px; width:300px; border-radius:8px; border:1px solid var(--border);">
        <div style="font-size:0.9em; color:var(--muted);">
          * Depp = Depreciation / สินค้าเสื่อมสภาพ
        </div>
      </div>

      <div class="table-responsive">
        <table class="stock-table">
          <thead>
            <tr>
              <th>รหัส/SKU</th>
              <th>ชื่อสินค้า</th>
              <th>แผนก</th>
              <th style="text-align:right;">ERP Qty</th>
              <th style="text-align:right;">Actual Qty</th>
              <th style="text-align:right;">Diff</th>
              <th style="text-align:right;">จอง (Reserve)</th>
              <th style="text-align:right;">คงเหลือ (Avail)</th>
              <th style="text-align:right;">Depp/Dead</th>
              <th style="text-align:center;">จัดการ</th>
            </tr>
          </thead>
          <tbody id="stock-table-body">
            <!-- Render by JS -->
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Modal Template for Actions -->
  <div id="action-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <h3 id="modal-title" style="margin-bottom: 16px; color:var(--primary);">Action</h3>
      <div class="field">
        <label>เลือกสินค้า</label>
        <select id="modal-item-select"></select>
      </div>
      <div class="field">
        <label>จำนวน</label>
        <input type="number" id="modal-qty" min="1" value="1">
      </div>
      <div class="field" id="modal-note-field">
        <label>หมายเหตุ / ผู้จอง / Ref.</label>
        <input type="text" id="modal-note" placeholder="ระบุเหตุผล หรือชื่อผู้จอง">
      </div>
      <div class="btn-row" style="margin-top:24px;">
        <button class="btn-cancel" id="modal-cancel">ยกเลิก</button>
        <button class="btn-confirm" id="modal-confirm">ยืนยัน</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script type="module" src="js/shared.js"></script>
  <script type="module" src="js/stock.js"></script>
</body>
</html>
