<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Login - RAZR LED Admin</title>
    <link rel="icon" type="image/png" href="../src/img/Logo_cm.png">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body data-theme="light">
    <div class="container container-login">
        <div class="login-card card page-fade-in"
            style="max-width: 400px; margin: 100px auto; padding: 40px; text-align: center;">
            <img src="../src/img/CM.png" alt="Chinavut Logo" style="height:150px;">
            <h3 style="margin-bottom: 10px; color: var(--primary);">RAZR BACKEND</h3>
            <h4 style="margin-bottom: 24px; color: var(--primary);">กรุณาเข้าสู่ระบบเพื่อจัดการข้อมูล</h4>

            <div class="field" style="margin-bottom: 14px; text-align: left;">
                <label style="display: block; margin-bottom: 6px; font-weight: 700;">Username</label>
                <input type="text" id="username" autofocus placeholder="Username"
                    style="width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: 12px;">
            </div>

            <div class="field" style="margin-bottom: 14px; text-align: left;">
                <label style="display: block; margin-bottom: 6px; font-weight: 700;">รหัสผ่าน (Password)</label>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="Password"
                        style="width: 100%; padding: 11px 12px; padding-right: 44px; border: 1px solid var(--border); border-radius: 12px;">
                    <button type="button" id="toggle-password"
                        style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 0.8em; color: var(--primary); padding: 4px 6px;"
                        title="แสดง/ซ่อนรหัสผ่าน">แสดง</button>
                </div>
            </div>

            <button class="btn btn-primary" id="login-submit"
                style="width: 100%; margin-top: 20px; background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: #fff; border: 0; border-radius: 12px; padding: 11px 15px; font-weight: 700; cursor: pointer;">เข้าสู่ระบบ</button>
        </div>
    </div>

    <script type="module" src="../js/data.js"></script>
    <script type="module" src="../js/storage.js"></script>
    <script type="module" src="../js/shared.js"></script>
    <script type="module">
        import { StaffAPI } from '../src/api/client.js?v=202604301724';

        (function () {
            async function init() {
                const state = await AppStorage.loadState();
                App.state = state;

                // If already logged in, skip login page
                if (App.state.currentUser) {
                    window.location.href = './admin.html';
                    return;
                }

                App.applyLanguage();
                App.applyTheme(state.ui.theme || 'light');

                const input = document.getElementById('username');
                const submitBtn = document.getElementById('login-submit');

                document.getElementById('toggle-password').addEventListener('click', () => {
                    const pwInput = document.getElementById('password');
                    const btn = document.getElementById('toggle-password');
                    if (pwInput.type === 'password') {
                        pwInput.type = 'text';
                        btn.textContent = 'ซ่อน';
                    } else {
                        pwInput.type = 'password';
                        btn.textContent = 'แสดง';
                    }
                });

                async function handleLogin() {
                    const val = input.value.trim();
                    const password = document.getElementById('password').value;
                    if (!val || !password) {
                        App.showToast('กรุณากรอกข้อมูลให้ครบ');
                        return;
                    }

                    const staff = await StaffAPI.getByUsername(val);
                    if (!staff || password !== staff.password) {
                        App.showToast('ข้อมูลไม่ถูกต้อง');
                        return;
                    }

                    // Authentication Success
                    App.state.currentUser = { id: val, name: staff.nick || staff.name, role: staff.role };
                    await AppStorage.saveState(App.state);
                    
                    App.showToast('เข้าสู่ระบบสำเร็จ');
                    setTimeout(() => {
                        window.location.href = './admin.html';
                    }, 1000);
                }

                submitBtn.addEventListener('click', handleLogin);
                input.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
                document.getElementById('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
            }
            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
</body>

</html>
