<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinavut LED Solution Calculator Pro</title>
    <link rel="icon" type="image/png" href="src/img/Logo_cm.png">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container page-fade-in">
        <div class="topbar">
            <div class="brand" style="display:flex; align-items:center; gap:12px;">
                <img src="src/img/Logo_cm.png" alt="Chinavut Logo" style="height:40px;">
                <div>
                    <h1 id="app-title" style="font-size: 1.2rem; margin: 0;">Chinavut LED Solution Calculator Pro</h1>
                    <div class="subtitle" id="app-subtitle" style="font-size: 0.8rem; opacity: 0.8;">คำนวณสเปก, ราคา,
                        และจัดการสินค้าได้จากหน้า Admin</div>
                </div>
            </div>
            <div class="toolbar">
                <div class="mode-toggle-pill" id="price-mode-wrapper" style="display:none;">
                    <button class="mode-opt active" data-mode="standard" data-i18n="modeStandard">มาตรฐาน</button>
                    <button class="mode-opt" data-mode="custom" data-i18n="modeStaff">พนักงาน</button>
                    <button class="mode-opt" data-mode="audit" data-i18n="modeAudit">ตรวจสอบ</button>
                </div>
                <div class="lang-toggle-pill" id="lang-toggle">
                    <button class="lang-opt active" data-lang="th">TH</button>
                    <button class="lang-opt" data-lang="en">EN</button>
                </div>
                <button class="btn btn-secondary" id="theme-toggle" data-i18n="theme">ธีม: สว่าง</button>
                <a class="btn btn-primary" id="home-link" href="dashboard.html"
                    data-i18n="dashboardHome">กลับหน้าแรก</a>
                <button class="btn btn-secondary" id="logout-btn" data-i18n="adminLogout"
                    style="display:none;">Logout</button>
            </div>
        </div>

        <div id="welcome-banner-section"></div>

        <div class="tabs">
            <button class="tab-btn active" data-group="UIR" data-i18n="tab1">UIRx/c (640x480)</button>
            <button class="tab-btn" data-group="CIH" data-i18n="tab3">CIH (600x337.5)</button>
            <button class="tab-btn" data-group="UOS" data-i18n="tab2">UOSx (960x960)</button>
        </div>

        <div class="card">
            <div class="grid-main">
                <div>
                    <div class="field">
                        <label data-i18n="selectLed">เลือกรุ่น LED Display</label>
                        <select id="led-select"></select>
                    </div>


                    <div class="mode-toggle" style="margin-top:12px;">
                        <button id="mode-qty" class="active" data-i18n="modeQty">จำนวนตู้</button>
                        <button id="mode-size" data-i18n="modeSize">เมตร (กว้าง*สูง)</button>
                    </div>

                    <div id="input-qty">
                        <div class="row">
                            <div class="field">
                                <label data-i18n="qtyW">จำนวนตู้ (แนวนอน)</label>
                                <input type="number" id="w_qty" data-i18n-placeholder="qtyWPlaceholder"
                                    placeholder="เช่น 5" min="0">
                            </div>
                            <div class="field">
                                <label data-i18n="qtyH">จำนวนตู้ (แนวตั้ง)</label>
                                <input type="number" id="h_qty" data-i18n-placeholder="qtyHPlaceholder"
                                    placeholder="เช่น 4" min="0">
                            </div>
                        </div>
                    </div>

                    <div id="input-size" style="display:none;">
                        <div class="row">
                            <div class="field">
                                <label data-i18n="unitWidth">กว้าง (เมตร)</label>
                                <input type="number" id="width_m" data-i18n-placeholder="widthPlaceholder">
                            </div>
                            <div class="field">
                                <label data-i18n="unitHeight">สูง (เมตร)</label>
                                <input type="number" id="height_m" data-i18n-placeholder="heightPlaceholder">
                            </div>
                        </div>
                    </div>

                    <div id="input-custom-price"
                        style="display:none; margin-top:12px; grid-template-columns: 1fr 1fr; gap: 12px; padding:14px; background:color-mix(in srgb, var(--primary) 5%, transparent); border:1px solid color-mix(in srgb, var(--primary) 20%, transparent); border-radius:8px;">
                        <div class="field">
                            <label data-i18n="customPriceLabel">ราคา LED ต่อ ตร.ม.</label>
                            <input type="number" id="custom-price-sqm" data-i18n-placeholder="customPricePlaceholder"
                                placeholder="เช่น 6000" min="0">
                        </div>
                        <div class="field">
                            <label data-i18n="customInstallLabel">ค่าติดตั้งจอ</label>
                            <input type="number" id="custom-install" data-i18n-placeholder="customInstallPlaceholder"
                                placeholder="ไม่ระบุ = 0" min="0">
                        </div>
                        <div class="field">
                            <label data-i18n="customSteelLabel">ค่าโครงสร้างเหล็กรับจอ</label>
                            <input type="number" id="custom-steel" data-i18n-placeholder="customExtraPlaceholder"
                                placeholder="ไม่ระบุ = 0" min="0">
                        </div>
                        <div class="field">
                            <label data-i18n="customAlumLabel">Aluminium Composite</label>
                            <input type="number" id="custom-alum" data-i18n-placeholder="customExtraPlaceholder"
                                placeholder="ไม่ระบุ = 0" min="0">
                        </div>
                        <div class="field">
                            <label data-i18n="customLoadCabLabel">ค่าติดตั้งตู้โหลดไฟฟ้า</label>
                            <input type="number" id="custom-load-cab" data-i18n-placeholder="customExtraPlaceholder"
                                placeholder="ไม่ระบุ = 0" min="0">
                        </div>
                        <div class="field">
                            <label data-i18n="customCableLabel">ค่าติดตั้งสายสัญญาณ</label>
                            <input type="number" id="custom-cable" data-i18n-placeholder="customExtraPlaceholder"
                                placeholder="ไม่ระบุ = 0" min="0">
                        </div>
                        <div class="field">
                            <label data-i18n="customDemoLabel">ค่ารื้อถอน</label>
                            <input type="number" id="custom-demo" data-i18n-placeholder="customExtraPlaceholder"
                                placeholder="ไม่ระบุ = 0" min="0">
                        </div>
                        <div class="field">
                            <label data-i18n="customFoundLabel">ค่าฝังฐานราก</label>
                            <input type="number" id="custom-foundation" data-i18n-placeholder="customExtraPlaceholder"
                                placeholder="ไม่ระบุ = 0" min="0">
                        </div>
                    </div>

                    <div id="aspect-ratio-feedback"
                        style="margin-top: 12px; margin-bottom: 8px; font-size: 0.95rem; padding: 8px 12px; background: color-mix(in srgb, var(--primary) 10%, transparent); border-left: 3px solid var(--primary); border-radius: 4px; display: none;">
                        <span data-i18n="aspectRatio">สัดส่วนจอ</span>: <b id="aspect-ratio-text"
                            style="color:var(--primary);"></b>
                    </div>

                    <div class="field" style="margin-top:8px;">
                        <label data-i18n="controller">เลือก Controller (หลัก)</label>
                        <div id="recom-badge" class="badge" data-i18n="recText">ระบบแนะนำรุ่นที่เหมาะสม</div>
                        <div style="display:flex; gap:8px;">
                            <div style="flex:1.2;">
                                <select id="con-select"></select>
                            </div>
                            <div style="flex:1; display:flex; gap:6px;">
                                <input type="number" id="con-qty" placeholder="Qty" min="1" value="1"
                                    style="width:50px;">
                                <input type="number" id="custom-controller-price" data-i18n-placeholder="price"
                                    placeholder="ราคา" min="0" style="flex:1; display:none;">
                            </div>
                        </div>
                    </div>

                    <div class="field"
                        style="margin-top:16px; padding:12px; background:color-mix(in srgb, var(--card) 90%, transparent); border:1px dashed var(--border); border-radius:12px;">
                        <label data-i18n="extraController">Controller เพิ่มเติม / อุปกรณ์เสริม</label>

                        <!-- Controller 2 -->
                        <div style="margin-bottom:8px; display:flex; gap:8px; align-items:flex-end;">
                            <div style="flex:1.2;">
                                <select id="con2-select">
                                    <option value="-1" data-i18n="none">-- ไม่รับ --</option>
                                </select>
                            </div>
                            <div style="flex:1; display:flex; gap:6px;">
                                <input type="number" id="con2-qty" placeholder="Qty" min="1" value="1"
                                    style="width:50px;">
                                <input type="number" id="con2-price" placeholder="ราคา" min="0"
                                    style="flex:1; display:none;">
                            </div>
                        </div>

                        <!-- Controller 3 -->
                        <div style="margin-bottom:8px; display:flex; gap:8px; align-items:flex-end;">
                            <div style="flex:1.2;">
                                <select id="con3-select">
                                    <option value="-1" data-i18n="none">-- ไม่รับ --</option>
                                </select>
                            </div>
                            <div style="flex:1; display:flex; gap:6px;">
                                <input type="number" id="con3-qty" placeholder="Qty" min="1" value="1"
                                    style="width:50px;">
                                <input type="number" id="con3-price" placeholder="ราคา" min="0"
                                    style="flex:1; display:none;">
                            </div>
                        </div>

                        <!-- Accessory -->
                        <div style="display:flex; gap:8px; align-items:flex-end;">
                            <div style="flex:1.2;">
                                <select id="acc-select">
                                    <option value="-1" data-i18n="none">-- ไม่รับ --</option>
                                </select>
                            </div>
                            <div style="flex:1;">
                                <input type="number" id="acc-price" placeholder="ราคา" min="0"
                                    style="width:100%; display:none;">
                            </div>
                        </div>
                    </div>

                    <div class="footer-actions" style="justify-content:flex-start;margin-top:18px;">
                        <button class="btn btn-secondary" id="calc-reset" data-i18n="reset">🔄 รีเซ็ตข้อมูล</button>
                        <button class="btn btn-success" id="detail-btn" data-i18n="detailBtn">📋 Detail</button>
                        <button class="btn btn-primary" id="copy-btn" data-i18n="copyBtn">📄 คัดลอกผลลัพธ์</button>
                    </div>
                </div>

                <div class="result" id="result-display"></div>
            </div>
        </div>
    </div>

    <script type="module" src="js/data.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/shared.js"></script>
    <script type="module" src="js/calculator.js?v=2"></script>
</body>

</html>
