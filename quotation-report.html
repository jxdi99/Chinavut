<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บันทึกใบเสนอราคา (Quotation Record) - RAZR LED</title>
  <link rel="icon" type="image/png" href="src/img/Logo_cm.png">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .form-container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
    .image-preview-container {
      margin-top: 10px;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }
    #img-preview { max-width: 100%; max-height: 300px; border-radius: 8px; display: none; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand" style="display:flex; align-items:center; gap:12px;">
      <img src="src/img/Logo_cm.png" alt="Chinavut Logo" style="height:40px;">
      <h1 style="font-size: 1.2rem; margin: 0;">บันทึกใบเสนอราคา</h1>
    </div>
    <div class="toolbar">
      <button class="btn btn-secondary" onclick="history.back()">← ยกเลิก</button>
      <button class="btn btn-primary" id="btn-save-quote">💾 บันทึกเอกสาร</button>
    </div>
  </div>

  <div class="form-container page-fade-in">
    <div class="card" style="padding:32px;">
      <h2 style="margin:0 0 24px; color:var(--primary); text-align:center;">QUOTATION RECORD</h2>
      
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
        <div class="field">
          <label>เลขที่ใบเสนอราคา (Quotation No.) *</label>
          <input type="text" id="qt-no" placeholder="เช่น QT2404001">
        </div>
        <div class="field">
          <label>อ้างอิงโปรเจค (Project ID)</label>
          <input type="text" id="qt-project-id" readonly style="background:var(--bg); color:var(--muted);">
        </div>
        <div class="field" style="grid-column: 1 / -1;">
          <label>ชื่อโปรเจค / ลูกค้า</label>
          <input type="text" id="qt-project-name" readonly style="background:var(--bg); color:var(--muted);">
        </div>
        <div class="field">
          <label>มูลค่ารวมสุทธิ (บาท)</label>
          <input type="number" id="qt-amount" placeholder="0.00">
        </div>
        <div class="field">
          <label>ผู้ออกเอกสาร</label>
          <input type="text" id="qt-issuer" placeholder="ระบุชื่อ">
        </div>
        
        <div class="field" style="grid-column: 1 / -1;">
          <label>ลิงก์รูปภาพตัวอย่าง / รายละเอียดสินค้า (URL)</label>
          <input type="text" id="qt-image-url" placeholder="https://... (แปะลิงก์รูปภาพเพื่อแสดงตัวอย่าง)">
        </div>
        
        <div class="field" style="grid-column: 1 / -1;">
          <div class="image-preview-container">
            <div id="img-placeholder" style="color:var(--muted); font-size:0.8rem;">พรีวิวรูปภาพ (จะแสดงเมื่อแปะลิงก์รูปภาพ)</div>
            <img id="img-preview" alt="Preview">
          </div>
        </div>

        <div class="field" style="grid-column: 1 / -1;">
          <label>หมายเหตุ / รายละเอียดเพิ่มเติม</label>
          <textarea id="qt-notes" rows="3" placeholder="ระบุรายละเอียดเพิ่มเติม..." style="width:100%; border-radius:12px; border:1px solid var(--border); padding:12px; font-family:inherit;"></textarea>
        </div>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script type="module" src="js/shared.js"></script>
  <script type="module" src="js/quotation-report.js"></script>
</body>
</html>
