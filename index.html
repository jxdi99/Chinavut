<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAZR LED Solution Calculator Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="topbar">
            <div class="brand">
                <h1 id="app-title">RAZR LED Solution Calculator Pro</h1>
                <div class="subtitle" id="app-subtitle">คำนวณสเปก, ราคา, และจัดการสินค้าได้จากหน้า Admin</div>
            </div>
            <div class="toolbar">
                <div class="pill">Admin: <b id="admin-status-pill">ยังไม่ล็อกอิน</b></div>
                <button class="btn btn-secondary" id="lang-toggle">TH / EN</button>
                <button class="btn btn-secondary" id="theme-toggle">ธีม: สว่าง</button>
                <a class="btn btn-primary" id="admin-link" href="admin.html" data-i18n="openAdmin">ไปหน้า Admin</a>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-group="UIR">UIRx/c (640x480)</button>
            <button class="tab-btn" data-group="CIH">CIH (600x337.5)</button>
            <button class="tab-btn" data-group="UOS">UOSx (960x960)</button>
        </div>

        <div class="card">
            <div class="grid-main">
                <div>
                    <div class="field">
                        <label data-i18n="selectLed">เลือกรุ่น LED Display</label>
                        <select id="led-select"></select>
                    </div>

                    <div class="mode-toggle">
                        <button id="mode-qty" class="active">จำนวนตู้</button>
                        <button id="mode-size">เมตร (กว้าง*สูง)</button>
                    </div>

                    <div id="input-qty">
                        <div class="row">
                            <div class="field">
                                <label>จำนวนตู้ (แนวนอน)</label>
                                <input type="number" id="w_qty" placeholder="เช่น 5" min="0">
                            </div>
                            <div class="field">
                                <label>จำนวนตู้ (แนวตั้ง)</label>
                                <input type="number" id="h_qty" placeholder="เช่น 4" min="0">
                            </div>
                        </div>
                    </div>

                    <div id="input-size" style="display:none;">
                        <div class="row">
                            <div class="field">
                                <label>กว้าง (เมตร)</label>
                                <input type="number" id="width_m">
                            </div>
                            <div class="field">
                                <label>สูง (เมตร)</label>
                                <input type="number" id="height_m">
                            </div>
                        </div>

                    </div>

                    <div class="field" style="margin-top:8px;">
                        <label data-i18n="controller">เลือก Controller</label>
                        <div id="recom-badge" class="badge">ระบบแนะนำรุ่นที่เหมาะสม</div>
                        <select id="con-select"></select>
                        <div class="small-muted" style="margin-top:8px;">คุณสามารถเลือกเองได้
                            ระบบจะไม่ทับค่าที่เลือกด้วยมือ</div>
                    </div>

                    <div class="field" style="margin-top:16px; padding:12px; background:color-mix(in srgb, var(--card) 90%, transparent); border:1px dashed var(--border); border-radius:12px;">
                        <label>Controller เพิ่มเติม / อุปกรณ์เสริม</label>
                        <div style="display:flex; gap:8px; margin-bottom:10px;">
                            <div style="flex:2;">
                                <select id="extra-con-select">
                                    <option value="-1">-- ไม่รับ Controller เพิ่ม --</option>
                                </select>
                            </div>
                            <div style="flex:1;">
                                <input type="number" id="extra-con-qty" placeholder="จำนวน" min="0" value="0">
                            </div>
                        </div>
                        <div style="display:flex; gap:8px;">
                            <div style="flex:2;">
                                <select id="acc-select">
                                    <option value="-1">-- ไม่รับอุปกรณ์เสริม --</option>
                                </select>
                            </div>
                            <div style="flex:1;">
                                <input type="number" id="acc-qty" placeholder="จำนวน" min="0" value="0">
                            </div>
                        </div>
                    </div>

                    <div class="footer-actions" style="justify-content:flex-start;margin-top:18px;">
                        <button class="btn btn-secondary" id="calc-refresh" data-i18n="refresh">รีเฟรชข้อมูล</button>
                        <button class="btn btn-primary" id="calc-again" data-i18n="calcAgain">คำนวณใหม่</button>
                        <a class="btn btn-quote" id="quote-link" href="quote.html">📄 ทำใบเสนอราคา</a>
                    </div>
                </div>

                <div class="result" id="result-display"></div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="storage.js"></script>
    <script src="shared.js"></script>
    <script src="index.js"></script>
</body>

</html>
