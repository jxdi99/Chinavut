<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAZR LED Solution Calculator Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="topbar">
            <div class="brand">
                <h1 id="app-title">RAZR LED Solution Calculator Pro</h1>
                <div class="subtitle" id="app-subtitle">คำนวณสเปก, ราคา, และจัดการสินค้าได้จากหน้า Admin</div>
            </div>
            <div class="toolbar">
                <div class="pill"><span data-i18n="adminOff">Admin: ยังไม่ล็อกอิน</span></div>
                <button class="btn btn-secondary" id="lang-toggle" data-i18n="lang">TH / EN</button>
                <button class="btn btn-secondary" id="theme-toggle" data-i18n="theme">ธีม: สว่าง</button>
                <a class="btn btn-primary" id="admin-link" href="admin.html" data-i18n="openAdmin">ไปหน้า Admin</a>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-group="UIR" data-i18n="tab1">UIRx/c (640x480)</button>
            <button class="tab-btn" data-group="CIH" data-i18n="tab3">CIH (600x337.5)</button>
            <button class="tab-btn" data-group="UOS" data-i18n="tab2">UOSx (960x960)</button>
        </div>

        <div class="card">
            <div class="grid-main">
                <div>
                    <div class="field">
                        <label data-i18n="selectLed">เลือกรุ่น LED Display</label>
                        <select id="led-select"></select>
                    </div>

                    <div class="mode-toggle">
                        <button id="mode-qty" class="active" data-i18n="modeQty">จำนวนตู้</button>
                        <button id="mode-size" data-i18n="modeSize">เมตร (กว้าง*สูง)</button>
                    </div>

                    <div id="input-qty">
                        <div class="row">
                            <div class="field">
                                <label data-i18n="qtyW">จำนวนตู้ (แนวนอน)</label>
                                <input type="number" id="w_qty" placeholder="เช่น 5" min="0">
                            </div>
                            <div class="field">
                                <label data-i18n="qtyH">จำนวนตู้ (แนวตั้ง)</label>
                                <input type="number" id="h_qty" placeholder="เช่น 4" min="0">
                            </div>
                        </div>
                    </div>

                    <div id="input-size" style="display:none;">
                        <div class="row">
                            <div class="field">
                                <label data-i18n="unitWidth">กว้าง (เมตร)</label>
                                <input type="number" id="width_m">
                            </div>
                            <div class="field">
                                <label data-i18n="unitHeight">สูง (เมตร)</label>
                                <input type="number" id="height_m">
                            </div>
                        </div>
                    </div>

                    <div id="aspect-ratio-feedback" style="margin-top: 12px; margin-bottom: 8px; font-size: 0.95rem; padding: 8px 12px; background: color-mix(in srgb, var(--primary) 10%, transparent); border-left: 3px solid var(--primary); border-radius: 4px; display: none;">
                        <span data-i18n="aspectRatio">สัดส่วนจอ</span>: <b id="aspect-ratio-text" style="color:var(--primary);"></b>
                    </div>

                    <div class="field" style="margin-top:8px;">
                        <label data-i18n="controller">เลือก Controller</label>
                        <div id="recom-badge" class="badge" data-i18n="recText">ระบบแนะนำรุ่นที่เหมาะสม</div>
                        <select id="con-select"></select>
                    </div>

                    <div class="field" style="margin-top:16px; padding:12px; background:color-mix(in srgb, var(--card) 90%, transparent); border:1px dashed var(--border); border-radius:12px;">
                        <label data-i18n="extraController">Controller เพิ่มเติม / อุปกรณ์เสริม</label>
                        <div style="display:flex; gap:8px; margin-bottom:10px;">
                            <div style="flex:2;">
                                <select id="extra-con-select">
                                    <option value="-1" data-i18n="none">-- ไม่รับ --</option>
                                </select>
                            </div>
                            <div style="flex:1;">
                                <input type="number" id="extra-con-qty" placeholder="Qty" min="0" value="0">
                            </div>
                        </div>
                        <div style="display:flex; gap:8px;">
                            <div style="flex:2;">
                                <select id="acc-select">
                                    <option value="-1" data-i18n="none">-- ไม่รับ --</option>
                                </select>
                            </div>
                            <div style="flex:1;">
                                <input type="number" id="acc-qty" placeholder="Qty" min="0" value="0">
                            </div>
                        </div>
                    </div>

                    <div class="footer-actions" style="justify-content:flex-start;margin-top:18px;">
                        <button class="btn btn-secondary" id="calc-refresh" data-i18n="refresh">รีเฟรชข้อมูล</button>
                        <button class="btn btn-primary" id="calc-again" data-i18n="calcAgain">คำนวณใหม่</button>
                        <a class="btn btn-quote" id="quote-link" href="quote.html" data-i18n="makeQuote">📄 ทำใบเสนอราคา</a>
                    </div>
                </div>

                <div class="result" id="result-display"></div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="storage.js"></script>
    <script src="shared.js"></script>
    <script src="index.js"></script>
</body>

</html>
