<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login - RAZR LED Solution</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .reset-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
        }
        .reset-modal.active { display: flex; }
        .reset-card {
            background: var(--card);
            border-radius: 16px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .reset-card h3 {
            color: var(--primary);
            margin-bottom: 16px;
            text-align: center;
        }
        .reset-card .field { margin-bottom: 14px; text-align: left; }
        .reset-card .field label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            font-size: 0.9em;
        }
        .reset-card .field input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.95em;
        }
        .reset-step { display: none; }
        .reset-step.active { display: block; }
        .reset-card .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .reset-card .btn-row button {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            border: none;
        }
        .reset-card .btn-cancel {
            background: var(--border);
            color: var(--text);
        }
        .reset-card .btn-confirm {
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: #fff;
        }
        .reset-card .info-text {
            font-size: 0.85em;
            color: var(--muted);
            margin-bottom: 12px;
            text-align: center;
        }
        .reset-card .success-text {
            text-align: center;
            color: #16a34a;
            font-weight: 700;
            font-size: 1.1em;
            padding: 20px 0;
        }
    </style>
</head>

<body data-theme="light">
    <div class="container container-login">
        <div class="login-card card page-fade-in"
            style="max-width: 400px; margin: 100px auto; padding: 40px; text-align: center;">
            <h2 data-i18n="loginTitlePage" style="margin-bottom: 24px; color: var(--primary);">พนักงานเข้าสู่ระบบ
            </h2>

            <div class="field" style="margin-bottom: 14px; text-align: left;">
                <label style="display: block; margin-bottom: 6px; font-weight: 700;">Username</label>
                <input type="text" id="username" autofocus placeholder="Username ของคุณ"
                    style="width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: 12px;">
            </div>
            
            <div class="field" style="margin-bottom: 14px; text-align: left;">
                <label style="display: block; margin-bottom: 6px; font-weight: 700;">รหัสผ่าน (Password)</label>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="รหัสผ่านของคุณ"
                        style="width: 100%; padding: 11px 12px; padding-right: 44px; border: 1px solid var(--border); border-radius: 12px;">
                    <button type="button" id="toggle-password"
                        style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 0.8em; color: var(--primary); padding: 4px 6px;"
                        title="แสดง/ซ่อนรหัสผ่าน">แสดง</button>
                </div>
            </div>

            <div style="text-align: right; margin-bottom: 10px;">
                <a href="#" id="forgot-password" style="font-size: 0.85em; color: var(--primary); text-decoration: none;">ลืมรหัสผ่าน?</a>
            </div>

            <button class="btn btn-primary" id="login-submit" data-i18n="loginBtn"
                style="width: 100%; margin-top: 20px; background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: #fff; border: 0; border-radius: 12px; padding: 11px 15px; font-weight: 700; cursor: pointer;">เข้าสู่ระบบ</button>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div class="reset-modal" id="reset-modal">
        <div class="reset-card">
            <!-- Step 1: Verify Identity -->
            <div class="reset-step active" id="reset-step-1">
                <h3>รีเซ็ตรหัสผ่าน</h3>
                <p class="info-text">กรุณายืนยันตัวตน โดยกรอก Username และอีเมลที่ลงทะเบียนไว้</p>
                <div class="field">
                    <label>Username</label>
                    <input type="text" id="reset-username" placeholder="Username ของคุณ">
                </div>
                <div class="field">
                    <label>อีเมล (Email)</label>
                    <input type="email" id="reset-email" placeholder="อีเมลที่ลงทะเบียนไว้">
                </div>
                <div class="btn-row">
                    <button class="btn-cancel" id="reset-cancel">ยกเลิก</button>
                    <button class="btn-confirm" id="reset-verify">ยืนยันตัวตน</button>
                </div>
            </div>

            <!-- Step 2: Set New Password -->
            <div class="reset-step" id="reset-step-2">
                <h3>ตั้งรหัสผ่านใหม่</h3>
                <p class="info-text">ยืนยันตัวตนสำเร็จ! กรุณาตั้งรหัสผ่านใหม่</p>
                <div class="field">
                    <label>รหัสผ่านใหม่</label>
                    <input type="password" id="reset-new-password" placeholder="รหัสผ่านใหม่">
                </div>
                <div class="field">
                    <label>ยืนยันรหัสผ่านใหม่</label>
                    <input type="password" id="reset-confirm-password" placeholder="พิมพ์รหัสผ่านใหม่อีกครั้ง">
                </div>
                <div class="btn-row">
                    <button class="btn-cancel" id="reset-back">ย้อนกลับ</button>
                    <button class="btn-confirm" id="reset-save">บันทึกรหัสผ่านใหม่</button>
                </div>
            </div>

            <!-- Step 3: Success -->
            <div class="reset-step" id="reset-step-3">
                <h3>สำเร็จ!</h3>
                <div class="success-text">✓ เปลี่ยนรหัสผ่านเรียบร้อยแล้ว</div>
                <p class="info-text">คุณสามารถเข้าสู่ระบบด้วยรหัสผ่านใหม่ได้ทันที</p>
                <div class="btn-row">
                    <button class="btn-confirm" id="reset-done" style="flex:1;">กลับไปหน้าเข้าสู่ระบบ</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/data.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/shared.js"></script>
    <script type="module" src="js/index.js"></script>
</body>

</html>
