<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รีเซ็ตรหัสผ่าน - RAZR LED Solution</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/reset-password.css">
</head>

<body data-theme="light">
    <div class="container container-login">
        <div class="login-card card page-fade-in"
            style="max-width: 420px; margin: 80px auto; padding: 40px; text-align: center;">

            <h2 style="margin-bottom: 8px; color: var(--primary);">รีเซ็ตรหัสผ่าน</h2>

            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step-dot active" id="dot-1"></div>
                <div class="step-dot" id="dot-2"></div>
                <div class="step-dot" id="dot-3"></div>
            </div>

            <!-- Step 1: Verify Identity -->
            <div class="reset-step active" id="reset-step-1">
                <p class="info-text">กรุณายืนยันตัวตนของคุณ<br>โดยกรอก Username และอีเมลหรือเบอร์โทรศัพท์ที่ลงทะเบียนไว้</p>
                <div class="field">
                    <label>Username</label>
                    <input type="text" id="reset-username" placeholder="Username ของคุณ" autofocus>
                </div>
                <div class="field">
                    <label>อีเมล หรือ เบอร์โทรศัพท์</label>
                    <input type="text" id="reset-contact" placeholder="example@company.com หรือ 098xxxxxxx">
                </div>
                <div class="btn-row">
                    <a href="index.html" class="btn-cancel">ยกเลิก</a>
                    <button class="btn-confirm" id="reset-verify">ยืนยันตัวตน</button>
                </div>
            </div>

            <!-- Step 2: Set New Password -->
            <div class="reset-step" id="reset-step-2">
                <p class="info-text">ยืนยันตัวตนสำเร็จ!<br>กรุณาตั้งรหัสผ่านใหม่ของคุณ</p>
                <div class="field">
                    <label>รหัสผ่านใหม่</label>
                    <div style="position: relative;">
                        <input type="password" id="reset-new-password" placeholder="รหัสผ่านใหม่" style="padding-right: 44px; width: 100%; box-sizing: border-box;">
                        <button type="button" id="toggle-new-password" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 0.8em; color: var(--primary); padding: 4px 6px;">แสดง</button>
                    </div>
                </div>
                <div class="field">
                    <label>ยืนยันรหัสผ่านใหม่</label>
                    <div style="position: relative;">
                        <input type="password" id="reset-confirm-password" placeholder="พิมพ์รหัสผ่านใหม่อีกครั้ง" style="padding-right: 44px; width: 100%; box-sizing: border-box;">
                        <button type="button" id="toggle-confirm-password" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 0.8em; color: var(--primary); padding: 4px 6px;">แสดง</button>
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn-cancel" id="reset-back">ย้อนกลับ</button>
                    <button class="btn-confirm" id="reset-save">บันทึกรหัสผ่านใหม่</button>
                </div>
            </div>

            <!-- Step 3: Success -->
            <div class="reset-step" id="reset-step-3">
                <div class="success-icon">✓</div>
                <div class="success-text">เปลี่ยนรหัสผ่านเรียบร้อยแล้ว!</div>
                <p class="info-text" style="margin-top: 12px;">คุณสามารถเข้าสู่ระบบด้วยรหัสผ่านใหม่ได้ทันที</p>
                <div class="btn-row">
                    <a href="index.html" class="btn-confirm" style="display:block;">กลับไปหน้าเข้าสู่ระบบ</a>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="js/data.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/shared.js"></script>
    <script type="module" src="js/reset-password.js"></script>
</body>

</html>
