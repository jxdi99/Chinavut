<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รีเซ็ตรหัสผ่าน - RAZR LED Solution</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }
        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.3s;
        }
        .step-dot.active {
            background: var(--primary);
            transform: scale(1.3);
        }
        .step-dot.done {
            background: #16a34a;
        }
        .reset-step {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .reset-step.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .field { margin-bottom: 16px; text-align: left; }
        .field label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            font-size: 0.9em;
        }
        .field input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.95em;
        }
        .info-text {
            font-size: 0.88em;
            color: var(--muted);
            margin-bottom: 16px;
            text-align: center;
            line-height: 1.5;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-row button, .btn-row a {
            flex: 1;
            padding: 11px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            text-align: center;
            text-decoration: none;
            font-size: 0.95em;
        }
        .btn-cancel {
            background: var(--border);
            color: var(--text);
        }
        .btn-confirm {
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: #fff;
        }
        .success-icon {
            font-size: 3em;
            text-align: center;
            margin: 16px 0;
            color: #16a34a;
        }
        .success-text {
            text-align: center;
            color: #16a34a;
            font-weight: 700;
            font-size: 1.1em;
        }
    </style>
</head>

<body data-theme="light">
    <div class="container container-login">
        <div class="login-card card page-fade-in"
            style="max-width: 420px; margin: 80px auto; padding: 40px; text-align: center;">

            <h2 style="margin-bottom: 8px; color: var(--primary);">รีเซ็ตรหัสผ่าน</h2>

            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step-dot active" id="dot-1"></div>
                <div class="step-dot" id="dot-2"></div>
                <div class="step-dot" id="dot-3"></div>
            </div>

            <!-- Step 1: Verify Identity -->
            <div class="reset-step active" id="reset-step-1">
                <p class="info-text">กรุณายืนยันตัวตนของคุณ<br>โดยกรอก Username และอีเมลที่ลงทะเบียนไว้ในระบบ</p>
                <div class="field">
                    <label>Username</label>
                    <input type="text" id="reset-username" placeholder="Username ของคุณ" autofocus>
                </div>
                <div class="field">
                    <label>อีเมลที่ลงทะเบียน</label>
                    <input type="email" id="reset-email" placeholder="example@company.com">
                </div>
                <div class="btn-row">
                    <a href="index.html" class="btn-cancel">ยกเลิก</a>
                    <button class="btn-confirm" id="reset-verify">ยืนยันตัวตน</button>
                </div>
            </div>

            <!-- Step 2: Set New Password -->
            <div class="reset-step" id="reset-step-2">
                <p class="info-text">ยืนยันตัวตนสำเร็จ!<br>กรุณาตั้งรหัสผ่านใหม่ของคุณ</p>
                <div class="field">
                    <label>รหัสผ่านใหม่</label>
                    <input type="password" id="reset-new-password" placeholder="รหัสผ่านใหม่">
                </div>
                <div class="field">
                    <label>ยืนยันรหัสผ่านใหม่</label>
                    <input type="password" id="reset-confirm-password" placeholder="พิมพ์รหัสผ่านใหม่อีกครั้ง">
                </div>
                <div class="btn-row">
                    <button class="btn-cancel" id="reset-back">ย้อนกลับ</button>
                    <button class="btn-confirm" id="reset-save">บันทึกรหัสผ่านใหม่</button>
                </div>
            </div>

            <!-- Step 3: Success -->
            <div class="reset-step" id="reset-step-3">
                <div class="success-icon">✓</div>
                <div class="success-text">เปลี่ยนรหัสผ่านเรียบร้อยแล้ว!</div>
                <p class="info-text" style="margin-top: 12px;">คุณสามารถเข้าสู่ระบบด้วยรหัสผ่านใหม่ได้ทันที</p>
                <div class="btn-row">
                    <a href="index.html" class="btn-confirm" style="display:block;">กลับไปหน้าเข้าสู่ระบบ</a>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="js/data.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/shared.js"></script>
    <script type="module">
        import { StaffAPI, supabase } from './src/api/client.js';

        let verifiedStaff = null;

        function showStep(step) {
            document.querySelectorAll('.reset-step').forEach(el => el.classList.remove('active'));
            document.getElementById(`reset-step-${step}`).classList.add('active');
            // Update dots
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById(`dot-${i}`);
                dot.classList.remove('active', 'done');
                if (i < step) dot.classList.add('done');
                if (i === step) dot.classList.add('active');
            }
        }

        // Step 1: Verify
        document.getElementById('reset-verify').addEventListener('click', async () => {
            const username = document.getElementById('reset-username').value.trim();
            const email = document.getElementById('reset-email').value.trim();

            if (!username || !email) {
                App.showToast('กรุณากรอก Username และอีเมลให้ครบ');
                return;
            }

            App.showToast('กำลังตรวจสอบ...');
            const staff = await StaffAPI.getByUsername(username);

            if (!staff) {
                App.showToast('ไม่พบ Username นี้ในระบบ');
                return;
            }

            if (!staff.email || staff.email.toLowerCase() !== email.toLowerCase()) {
                App.showToast('อีเมลไม่ตรงกับข้อมูลในระบบ');
                return;
            }

            verifiedStaff = staff;
            showStep(2);
            document.getElementById('reset-new-password').focus();
        });

        // Step 2: Back
        document.getElementById('reset-back').addEventListener('click', () => showStep(1));

        // Step 2: Save
        document.getElementById('reset-save').addEventListener('click', async () => {
            const newPw = document.getElementById('reset-new-password').value;
            const confirmPw = document.getElementById('reset-confirm-password').value;

            if (!newPw) {
                App.showToast('กรุณากรอกรหัสผ่านใหม่');
                return;
            }
            if (newPw.length < 3) {
                App.showToast('รหัสผ่านต้องมีอย่างน้อย 3 ตัวอักษร');
                return;
            }
            if (newPw !== confirmPw) {
                App.showToast('รหัสผ่านไม่ตรงกัน กรุณาพิมพ์ใหม่');
                return;
            }

            App.showToast('กำลังบันทึก...');
            const { error } = await supabase
                .from('staff')
                .update({ password: newPw })
                .eq('id', verifiedStaff.id);

            if (error) {
                App.showToast('เกิดข้อผิดพลาด: ' + error.message);
                return;
            }

            showStep(3);
        });
    </script>
</body>

</html>
