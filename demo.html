<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเดโม่สินค้า (Demo) - RAZR LED Portal</title>
  <link rel="icon" type="image/png" href="src/img/Logo_cm.png">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/led-products.css">
</head>
<body>
  <div class="topbar">
    <div class="brand" style="display:flex; align-items:center; gap:12px;">
      <img src="src/img/Logo_cm.png" alt="Chinavut Logo" style="height:40px;">
      <h1 style="font-size: 1.2rem; margin: 0;">ระบบเดโม่สินค้า (Demo)</h1>
    </div>
    <div class="toolbar">
      <a href="dashboard.html" class="btn btn-secondary">← กลับหน้าหลัก</a>
      <button class="btn btn-danger" id="logout-btn">ออกจากระบบ</button>
    </div>
  </div>

  <div class="led-container page-fade-in">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
      <div>
        <h2 style="margin:0;">🎥 รายการเดโม่สินค้า</h2>
        <p style="color:var(--muted); margin:4px 0 0;">จัดการตารางการเดโม่และบันทึกรายงานผลเดโม่</p>
      </div>
    </div>

    <div class="card">
      <div class="inventory-table-wrap">
        <table class="inventory-table">
          <thead>
            <tr>
              <th>เลขที่เอกสาร</th>
              <th>โปรเจคอ้างอิง</th>
              <th>ลูกค้า</th>
              <th>ผู้ทำเดโม่</th>
              <th>วันที่</th>
              <th>หมายเหตุ</th>
              <th>ไฟล์</th>
            </tr>
          </thead>
          <tbody id="demo-table-body">
            <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted);">กำลังโหลดข้อมูล...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script type="module" src="js/shared.js"></script>
  <script type="module">
    import { supabase } from './js/../src/api/client.js';
    async function init() {
      await App.checkAuth();
      const state = await AppStorage.loadState();
      document.documentElement.setAttribute('data-theme', state.ui?.theme || 'light');
      document.getElementById('logout-btn').addEventListener('click', App.logout);

      const { data, error } = await supabase
        .from('project_reports')
        .select('*, led_projects(project_name, customer_name)')
        .eq('doc_type', 'Demo')
        .order('created_at', { ascending: false });

      const tbody = document.getElementById('demo-table-body');
      if (error || !data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted);">ยังไม่มีรายการเดโม่</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(r => `
        <tr>
          <td style="font-weight:700;">${r.doc_no}</td>
          <td>${r.led_projects?.project_name || '-'}</td>
          <td>${r.led_projects?.customer_name || '-'}</td>
          <td>${r.created_by || '-'}</td>
          <td>${new Date(r.created_at).toLocaleDateString('th-TH')}</td>
          <td><small>${r.notes || '-'}</small></td>
          <td>${r.doc_url ? `<a href="${r.doc_url}" target="_blank">🔗 เปิดไฟล์</a>` : '-'}</td>
        </tr>
      `).join('');
    }
    init();
  </script>
</body>
</html>
