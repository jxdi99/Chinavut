<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login - RAZR LED Solution</title>
  <script type="module" crossorigin src="/calculator_LED/assets/main-BcC0ShRZ.js"></script>
  <link rel="modulepreload" crossorigin href="/calculator_LED/assets/shared-C1HfS9Ki.js">
  <link rel="stylesheet" crossorigin href="/calculator_LED/assets/styles-DIc31TLr.css">
</head>

<body data-theme="light">
    <div class="container container-login">
        <div class="login-card card page-fade-in"
            style="max-width: 400px; margin: 100px auto; padding: 40px; text-align: center;">
            <h2 data-i18n="loginTitlePage" style="margin-bottom: 24px; color: var(--primary);">เข้าสู่ระบบ (Employee)
            </h2>

            <div class="field" style="margin-bottom: 14px; text-align: left;">
                <label data-i18n="empId"
                    style="display: block; margin-bottom: 6px; font-weight: 700;">รหัสพนักงาน</label>
                <input type="text" id="employee-id" autofocus placeholder="HR-SX-0-000"
                    style="width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: 12px; text-transform: uppercase;">
            </div>

            <button class="btn btn-primary" id="login-submit" data-i18n="loginBtn"
                style="width: 100%; margin-top: 20px; background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: #fff; border: 0; border-radius: 12px; padding: 11px 15px; font-weight: 700; cursor: pointer;">เข้าสู่ระบบ</button>

            <div style="margin-top: 20px;">

            </div>
        </div>
    </div>

</body>

</html>
