<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login - RAZR LED Solution</title>
  <script type="module" crossorigin src="/calculator_LED/assets/main-Cs9lMcdB.js"></script>
  <link rel="modulepreload" crossorigin href="/calculator_LED/assets/client-fN6McSnU.js">
  <link rel="modulepreload" crossorigin href="/calculator_LED/assets/modulepreload-polyfill-iJ-6Fn-a.js">
  <link rel="modulepreload" crossorigin href="/calculator_LED/assets/shared-uvIJ2Joy.js">
  <link rel="modulepreload" crossorigin href="/calculator_LED/assets/storage-BKDZLB7h.js">
  <link rel="stylesheet" crossorigin href="/calculator_LED/assets/styles-DIc31TLr.css">
</head>

<body data-theme="light">
    <div class="container container-login">
        <div class="login-card card page-fade-in"
            style="max-width: 400px; margin: 100px auto; padding: 40px; text-align: center;">
            <h2 data-i18n="loginTitlePage" style="margin-bottom: 24px; color: var(--primary);">พนักงานเข้าสู่ระบบ
            </h2>

            <div class="field" style="margin-bottom: 14px; text-align: left;">
                <label style="display: block; margin-bottom: 6px; font-weight: 700;">Username</label>
                <input type="text" id="username" autofocus placeholder="Username ของคุณ"
                    style="width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: 12px;">
            </div>
            
            <div class="field" style="margin-bottom: 14px; text-align: left;">
                <label style="display: block; margin-bottom: 6px; font-weight: 700;">รหัสผ่าน (Password)</label>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="รหัสผ่านของคุณ"
                        style="width: 100%; padding: 11px 12px; padding-right: 44px; border: 1px solid var(--border); border-radius: 12px;">
                    <button type="button" id="toggle-password"
                        style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 0.8em; color: var(--primary); padding: 4px 6px;"
                        title="แสดง/ซ่อนรหัสผ่าน">แสดง</button>
                </div>
            </div>

            <div style="text-align: right; margin-bottom: 10px;">
                <a href="reset-password.html" style="font-size: 0.85em; color: var(--primary); text-decoration: none;">ลืมรหัสผ่าน?</a>
            </div>

            <button class="btn btn-primary" id="login-submit" data-i18n="loginBtn"
                style="width: 100%; margin-top: 20px; background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: #fff; border: 0; border-radius: 12px; padding: 11px 15px; font-weight: 700; cursor: pointer;">เข้าสู่ระบบ</button>
        </div>
    </div>


</body>

</html>
