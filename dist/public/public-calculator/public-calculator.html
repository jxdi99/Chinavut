<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAZR LED Solution - Public Preview</title>
    <style>
        body { padding-bottom: 50px; }
        .preview-section {
            margin-top: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            height: 400px;
            position: relative;
            background: color-mix(in srgb, var(--bg-body) 90%, transparent);
            border: 1px solid var(--border);
        }
    </style>
  <script type="module" crossorigin src="../../assets/public_home-CIAPPCDo.js"></script>
  <link rel="modulepreload" crossorigin href="../../assets/modulepreload-polyfill-N-DOuI4P.js">
  <link rel="modulepreload" crossorigin href="../../assets/client-CjmNwGvi.js">
  <link rel="modulepreload" crossorigin href="../../assets/shared-DR0l8u2-.js">
  <link rel="modulepreload" crossorigin href="../../assets/storage-QM5bYiLC.js">
  <link rel="stylesheet" crossorigin href="../../assets/detail-DoZgalYt.css">
  <link rel="stylesheet" crossorigin href="../../assets/styles-DIc31TLr.css">
</head>

<body data-theme="light">
    <!-- Topbar -->
    <div class="topbar">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-weight:700; font-size:1.1em; color:var(--text); display:flex; align-items:center; gap:8px;">
                <img src="../../assets/LOGO-DYoxh--2.png" alt="RAZR Logo" style="height:40px;">
                LED Preview
            </div>
            <div style="display:flex; gap:12px; align-items:center;">
                <div class="lang-toggle-pill" id="lang-toggle">
                    <button class="lang-opt active" data-lang="th">TH</button>
                    <button class="lang-opt" data-lang="en">EN</button>
                </div>
                <button class="btn btn-secondary" id="theme-toggle" data-i18n="theme">ธีม: สว่าง</button>
                <a class="btn btn-secondary" id="home-link" href="../../index.html">🔐 พนักงาน Login</a>
            </div>
        </div>
    </div>

    <div class="container" style="max-width: 800px; padding-top: 24px;">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-group="UIR" data-i18n="tab1">UIRx/c (640x480)</button>
            <button class="tab-btn" data-group="CIH" data-i18n="tab3">CIH (600x337.5)</button>
            <button class="tab-btn" data-group="UOS" data-i18n="tab2">UOSx (960x960)</button>
        </div>

        <div class="card">
            <!-- Select LED -->
            <div class="field" style="margin-bottom: 16px;">
                <label data-i18n="selectLed">เลือกรุ่น LED Display</label>
                <select id="led-select"></select>
            </div>

            <!-- Mode Toggle -->
            <div class="mode-toggle" style="margin-bottom: 16px;">
                <button class="mode-btn active" id="mode-qty" data-i18n="modeQty">ระบุจำนวน (ตู้)</button>
                <button class="mode-btn" id="mode-size" data-i18n="modeSize">ระบุขนาด (เมตร)</button>
            </div>

            <!-- Inputs -->
            <div class="row" id="input-qty">
                <div class="field">
                    <label data-i18n="cabWidth">กว้าง (จำนวนตู้)</label>
                    <input type="number" id="w_qty" placeholder="0" min="1">
                </div>
                <div class="field">
                    <label data-i18n="cabHeight">สูง (จำนวนตู้)</label>
                    <input type="number" id="h_qty" placeholder="0" min="1">
                </div>
            </div>

            <div class="row" id="input-size" style="display:none;">
                <div class="field">
                    <label data-i18n="sizeWidthM">กว้าง (เมตร)</label>
                    <input type="number" id="width_m" placeholder="0.00" min="0.1" step="0.1">
                    <div class="field-hint" data-i18n="autoAdjustHint" style="font-size: 0.8em; color: var(--muted); margin-top: 4px;">*ระบบจะปัดเศษให้พอดีกับขนาดตู้</div>
                </div>
                <div class="field">
                    <label data-i18n="sizeHeightM">สูง (เมตร)</label>
                    <input type="number" id="height_m" placeholder="0.00" min="0.1" step="0.1">
                </div>
            </div>
            
            <!-- Notice -->
            <div style="margin-top:20px; padding:15px; background: color-mix(in srgb, var(--primary) 10%, transparent); border-left: 4px solid var(--primary); border-radius: 4px; text-align: center; color: var(--text);">
                <b>สนใจสั่งซื้อ หรือสอบถามราคา กรุณาติดต่อฝ่ายขาย RAZR</b>
            </div>
        </div>

        <!-- Visualizer -->
        <section class="preview-section" id="preview-section">
            <div class="ground-line">
                <span class="ground-label" data-i18n="groundLevel">ระดับพื้นดิน (GROUND LEVEL)</span>
            </div>
            <!-- Human scale -->
            <div class="scale-ref" id="scale-wrap">
                <svg class="human-svg" id="human-svg" viewBox="0 0 60 120" preserveAspectRatio="xMidYMax meet">
                    <circle cx="30" cy="13" r="11" fill="currentColor" />
                    <rect x="15" y="26" width="30" height="42" rx="4" fill="currentColor" />
                    <rect x="15" y="68" width="12" height="52" rx="3" fill="currentColor" />
                    <rect x="33" y="68" width="12" height="52" rx="3" fill="currentColor" />
                    <rect x="3" y="28" width="10" height="36" rx="3" fill="currentColor" />
                    <rect x="47" y="28" width="10" height="36" rx="3" fill="currentColor" />
                </svg>
                <div class="human-label" id="human-dim-val">1.6 เมตร</div>
            </div>
            <!-- LED Screen Box -->
            <div class="screen-viz" id="screen-viz" style="width: 0; height: 0;">
                <div class="screen-image-bg"></div>
                <!-- dimension lines -->
                <div class="dim-top-line"></div>
                <div class="dim-right-line"></div>
                <div class="dim-label dim-w-label" id="dim-w-val">0.00 ม.</div>
                <div class="dim-label dim-h-label" id="dim-h-val">0.00 ม.</div>
                <!-- info overlay -->
                <div class="screen-overlay">
                    <div class="overlay-array" id="overlay-array">0 × 0</div>
                    <div class="overlay-res" id="overlay-res">0 × 0 Pixels</div>
                </div>
            </div>
            <!-- screen product label top right -->
            <div class="screen-product-label" id="screen-product-label">
                LED Indoor COB · P? · <strong id="label-size">W 0.00 × H 0.00 เมตร</strong>
                <span class="label-badge" id="label-badge">1.1</span>
            </div>
        </section>

    </div>

</body>
</html>
