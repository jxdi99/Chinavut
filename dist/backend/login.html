<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login - RAZR LED Solution</title>
  <link rel="stylesheet" crossorigin href="/assets/styles-XVULy1iy.css">
</head>

<body data-theme="light">
    <div class="container">
        <div class="login-card card">
            <h2 data-i18n="loginTitlePage">เข้าสู่ระบบ (Employee)</h2>

            <div class="field">
                <label data-i18n="empId">รหัสพนักงาน</label>
                <input type="text" id="employee-id" placeholder="กรอกรหัสพนักงาน" autofocus>
            </div>

            <button class="btn btn-primary" id="login-submit" style="width: 100%; margin-top: 20px;"
                data-i18n="loginBtn">เข้าสู่ระบบ</button>
        </div>
    </div>

    <script src="/data.js"></script>
    <script src="/storage.js"></script>
    <script src="/shared.js"></script>
    <script src="./login.js"></script>
</body>

</html>
