<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <base href="../">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แจ้งซ่อม / ติดตามงาน - RAZR LED</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/public-service.css">
</head>

<body data-theme="light">
    <!-- Topbar -->
    <div class="topbar">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-weight:700; font-size:1.1em; color:var(--text); display:flex; align-items:center; gap:8px;">
                <img src="src/img/LOGO.png" alt="RAZR Logo" style="height:24px;">
                LED Service
            </div>
            <div style="display:flex; gap:12px; align-items:center;">
                <a class="btn btn-secondary" href="public/public.html">📊 โปรแกรมคำนวณ</a>
                <a class="btn btn-secondary" href="index.html">🔐 พนักงาน Login</a>
            </div>
        </div>
    </div>

    <div class="container" style="max-width: 800px; padding-top: 24px;">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" id="tab-request">📝 แจ้งซ่อมใหม่</button>
            <button class="tab-btn" id="tab-track">🔍 ติดตามสถานะงาน</button>
        </div>

        <!-- Section: New Request -->
        <div id="section-request" class="service-section">
            <div class="card">
                <h3 style="margin-top: 0; color: var(--primary);">🔧 แจ้งซ่อมจอ LED</h3>
                <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 20px;">กรุณากรอกข้อมูลให้ครบถ้วนเพื่อให้เจ้าหน้าที่ติดต่อกลับ</p>

                <div class="service-form">
                    <div class="row">
                        <div class="field">
                            <label>ชื่อผู้แจ้ง / บริษัท</label>
                            <input type="text" id="cust-name" placeholder="ระบุชื่อของคุณหรือชื่อบริษัท">
                        </div>
                        <div class="field">
                            <label>เบอร์โทรศัพท์ติดต่อ</label>
                            <input type="tel" id="cust-phone" placeholder="เช่น 081-234-5678">
                        </div>
                    </div>
                    <div class="field">
                        <label>หัวข้อแจ้งซ่อม / อาการเสีย</label>
                        <input type="text" id="cust-subject" placeholder="เช่น จอไม่ติดบางส่วน, สีเพี้ยน">
                    </div>
                    <div class="field">
                        <label>รายละเอียดเพิ่มเติม / ที่อยู่หน้างาน</label>
                        <textarea id="cust-detail" rows="3" placeholder="ระบุรายละเอียดอาการเสีย หรือที่อยู่ที่ต้องการให้ทีมช่างเข้าตรวจสอบ"></textarea>
                    </div>
                    <button class="btn btn-primary" id="btn-submit" style="width: 100%; margin-top: 10px; height: 50px; font-size: 1.1rem;">📤 ส่งข้อมูลแจ้งซ่อม</button>
                </div>
            </div>
        </div>

        <!-- Section: Track Status -->
        <div id="section-track" class="service-section" style="display: none;">
            <div class="card">
                <h3>🔍 ตรวจสอบสถานะงาน</h3>
                <div class="search-box" style="display: flex; gap: 10px; margin-bottom: 24px;">
                    <input type="tel" id="track-phone" placeholder="ระบุเบอร์โทรศัพท์ที่ใช้แจ้งงาน" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                    <button class="btn btn-primary" id="btn-track">ค้นหา</button>
                </div>

                <div id="track-result" style="display: none;">
                    <!-- Steps Progress -->
                    <div class="progress-wrapper">
                        <div class="progress-steps">
                            <div class="step" id="step-1">
                                <div class="step-icon">1</div>
                                <div class="step-label">แจ้งงานเสร็จสิ้น</div>
                            </div>
                            <div class="step-line"></div>
                            <div class="step" id="step-2">
                                <div class="step-icon">2</div>
                                <div class="step-label">กำลังดำเนินการ</div>
                            </div>
                            <div class="step-line"></div>
                            <div class="step" id="step-3">
                                <div class="step-icon">3</div>
                                <div class="step-label">ดำเนินการเสร็จสิ้น</div>
                            </div>
                        </div>
                    </div>

                    <div class="job-info-card" id="job-info">
                        <!-- Loaded by JS -->
                    </div>
                </div>
                
                <div id="track-empty" style="display: none; text-align: center; padding: 40px; color: var(--muted);">
                    📭 ไม่พบข้อมูลงานแจ้งซ่อมสำหรับเบอร์โทรศัพท์นี้
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" style="display: none;"></div>

    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script type="module" src="js/shared.js"></script>
    <script type="module" src="js/public-service.js"></script>
</body>

</html>
